
    <nav class="sidebar" [class.expanded]="expanded()">
      <div class="sidebar-header">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
            <circle cx="12" cy="12" r="5" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
            <circle cx="12" cy="12" r="2" fill="#00d4ff"/>
            <line x1="12" y1="3" x2="12" y2="1" stroke="#00d4ff" stroke-width="1.5"/>
            <line x1="12" y1="23" x2="12" y2="21" stroke="#00d4ff" stroke-width="1.5"/>
            <line x1="3" y1="12" x2="1" y2="12" stroke="#00d4ff" stroke-width="1.5"/>
            <line x1="23" y1="12" x2="21" y2="12" stroke="#00d4ff" stroke-width="1.5"/>
          </svg>
        </div>
        @if (expanded()) {
          <div class="logo-text fade-in">
            <span class="brand">AirWatch</span>
            <span class="tagline">Monitor IoT</span>
          </div>
        }
        <button class="toggle-btn" (click)="expanded.set(!expanded())">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            @if (expanded()) {
              <path d="M15 18l-6-6 6-6"/>
            } @else {
              <path d="M9 18l6-6-6-6"/>
            }
          </svg>
        </button>
      </div>

      <div class="nav-section">
        @if (expanded()) { <span class="nav-label slide-in">NAVEGACAO</span> }
        @for (item of navItems; track item.path) {
          <a [routerLink]="item.path" routerLinkActive="active" class="nav-item">
            <span class="nav-icon" [innerHTML]="item.icon"></span>
            @if (expanded()) { <span class="nav-text fade-in">{{ item.label }}</span> }
          </a>
        }
      </div>

      <div class="sidebar-footer">
        @if (expanded()) {
          <div class="user-info fade-in">
            <div class="user-avatar">{{ initials() }}</div>
            <div class="user-details">
              <span class="user-name">{{ auth.user()?.userName }}</span>
              <span class="user-email">{{ auth.user()?.email }}</span>
            </div>
          </div>
        }
        <button class="logout-btn" (click)="auth.logout()" title="Sair">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16,17 21,12 16,7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          @if (expanded()) { <span class="fade-in">Sair</span> }
        </button>
      </div>
    </nav>
