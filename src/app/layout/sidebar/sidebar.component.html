
    <nav class="sidebar" [class.expanded]="expanded()">
      <div class="sidebar-header">
        <div class="logo-icon">
          <img src="/airwatch-icon.svg" class="logo-img" alt="AirWatch" width="22" height="22">
        </div>
        <div class="logo-text">
          <span class="brand">AirWatch</span>
          <span class="tagline">Monitor IoT</span>
        </div>
        <button class="toggle-btn" (click)="expanded.set(!expanded())" title="Recolher menu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            @if (expanded()) {
              <path d="M15 18l-6-6 6-6"/>
            } @else {
              <path d="M9 18l6-6-6-6"/>
            }
          </svg>
        </button>
      </div>

      <div class="nav-section">
        <span class="nav-label">NAVEGAÇÃO</span>
        @for (item of navItems; track item.path) {
          <a [routerLink]="item.path" routerLinkActive="active" class="nav-item" [title]="!expanded() ? item.label : ''">
            <span class="nav-icon" [innerHTML]="item.icon"></span>
            <span class="nav-text">{{ item.label }}</span>
          </a>
        }
      </div>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">{{ initials() }}</div>
          <div class="user-details">
            <span class="user-name">{{ auth.user()?.userName }}</span>
            <span class="user-email">{{ auth.user()?.email }}</span>
          </div>
        </div>
        <button class="logout-btn" (click)="auth.logout()" title="Sair">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16,17 21,12 16,7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span class="nav-text">Sair</span>
        </button>
      </div>
    </nav>
