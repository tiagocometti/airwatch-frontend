
    <div class="login-page">
      <div class="bg-orb orb-1"></div>
      <div class="bg-orb orb-2"></div>

      <div class="login-card fade-in">
        <div class="card-header">
          <div class="logo-mark">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
              <circle cx="12" cy="12" r="5" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
              <circle cx="12" cy="12" r="2" fill="#00d4ff"/>
            </svg>
          </div>
          <h1 class="card-title">AirWatch</h1>
          <p class="card-subtitle">Monitoramento de Qualidade do Ar</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
          <div class="field-group">
            <label class="field-label">E-mail</label>
            <div class="field-wrapper">
              <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input
                type="email"
                formControlName="email"
                class="field-input"
                placeholder="seu@email.com"
                autocomplete="email"
              />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Senha</label>
            <div class="field-wrapper">
              <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                [type]="showPassword() ? 'text' : 'password'"
                formControlName="password"
                class="field-input"
                placeholder="..."
                autocomplete="current-password"
              />
              <button type="button" class="toggle-pw" (click)="showPassword.set(!showPassword())">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  @if (showPassword()) {
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                  } @else {
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  }
                </svg>
              </button>
            </div>
          </div>

          @if (error()) {
            <div class="error-msg fade-in">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              {{ error() }}
            </div>
          }

          <button type="submit" class="submit-btn" [disabled]="loading() || form.invalid">
            @if (loading()) {
              <span class="spinner"></span> Entrando...
            } @else {
              Entrar
            }
          </button>
        </form>
        <p class="footer-link">
          Não tem conta? <a routerLink="/register" class="link">Crie uma aqui</a>
        </p>
      </div>
    </div>
