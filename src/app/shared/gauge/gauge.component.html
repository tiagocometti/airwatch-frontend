<div class="gauge-wrapper">
  <div class="gauge-gas-name">{{ gasName }}</div>

  <svg viewBox="0 0 200 145" width="200" height="145" class="gauge-svg">
    <!-- Background track -->
    <path [attr.d]="trackPath" fill="rgba(255,255,255,0.06)" />

    <!-- Zone arcs -->
    @for (zone of zones; track zone.color) {
      <path [attr.d]="zone.path" [attr.fill]="zone.color" opacity="0.9" />
    }

    <!-- Needle -->
    <g [style.transformOrigin]="dotCx + 'px ' + dotCy + 'px'"
       [style.transform]="'rotate(' + needleRotation + 'deg)'"
       class="needle-group">
      <line [attr.x1]="dotCx" [attr.y1]="dotCy"
            [attr.x2]="needleX2" [attr.y2]="dotCy"
            stroke="white" stroke-width="2.5" stroke-linecap="round" />
      <line [attr.x1]="dotCx - 10" [attr.y1]="dotCy"
            [attr.x2]="dotCx" [attr.y2]="dotCy"
            stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- Center dot -->
    <circle [attr.cx]="dotCx" [attr.cy]="dotCy" r="6" fill="#1a2a3a" stroke="white" stroke-width="2" />

    <!-- Value text -->
    <text [attr.x]="dotCx" [attr.y]="dotCy + 20"
          text-anchor="middle" fill="white"
          font-size="18" font-weight="700" font-family="'JetBrains Mono', 'Courier New', monospace">
      {{ value | number:'1.0-1' }}
    </text>
    <text [attr.x]="dotCx" [attr.y]="dotCy + 34"
          text-anchor="middle" fill="#6a8fa8" font-size="10">
      {{ unit }}
    </text>
  </svg>

  <!-- Status label -->
  <div class="gauge-status" [style.color]="status.color">{{ status.label }}</div>
</div>
